services:
  - type: web
    name: redew-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///shakky_music.db
    # This installs ffmpeg on Render
    buildFilter:
      paths:
        - backend/**
